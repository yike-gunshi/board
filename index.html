<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>团队任务调度台 · 任务控制台</title>
  <meta name="color-scheme" content="dark">
  <style>
:root {
  --bg: #0b1020;
  --bg-soft: #0f172d;
  --panel: #101826;
  --panel-2: #131d2f;
  --panel-3: #162337;
  --surface: rgba(255, 255, 255, 0.04);
  --surface-2: rgba(255, 255, 255, 0.06);
  --border: rgba(148, 163, 184, 0.16);
  --border-strong: rgba(96, 165, 250, 0.38);
  --text: #ecf3ff;
  --muted: #93a4bd;
  --muted-2: #6d7f99;
  --accent: #7dd3fc;
  --blue: #60a5fa;
  --violet: #a78bfa;
  --emerald: #34d399;
  --amber: #fbbf24;
  --rose: #fb7185;
  --slate: #cbd5e1;
  --shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
  --radius-xl: 24px;
  --radius-lg: 18px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --font: Inter, -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  color-scheme: dark;
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  font-family: var(--font);
  background:
    radial-gradient(circle at top left, rgba(96, 165, 250, 0.14), transparent 26%),
    radial-gradient(circle at 85% 0%, rgba(167, 139, 250, 0.12), transparent 22%),
    linear-gradient(180deg, #090d18 0%, #0b1120 38%, #08101c 100%);
  color: var(--text);
}
button, input, select, textarea {
  font: inherit;
}
button {
  cursor: pointer;
}
.app-shell {
  width: min(1680px, calc(100% - 40px));
  margin: 20px auto 28px;
}
.panel {
  background: linear-gradient(180deg, rgba(18, 25, 38, 0.98), rgba(13, 19, 31, 0.98));
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow);
}
.topbar {
  padding: 22px 24px;
  display: grid;
  gap: 18px;
}
.topbar-main {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: flex-start;
}
.eyebrow,
.section-kicker {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--accent);
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 700;
}
.topbar h1 {
  margin: 8px 0 0;
  font-size: 34px;
  letter-spacing: -0.04em;
}
.topbar-subtitle {
  margin: 10px 0 0;
  color: var(--muted);
  font-size: 14px;
  line-height: 1.7;
}
.topbar-meta,
.topbar-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.meta-chip {
  padding: 10px 12px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: var(--muted);
  font-size: 12px;
}
.meta-chip strong {
  color: var(--text);
  font-weight: 600;
}
.btn,
.icon-btn,
.tab-btn,
.filter-chip,
.task-card,
.summary-card,
.timeline-card,
.list-row,
.archive-card,
.focus-card,
.quick-link {
  transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
}
.btn {
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text);
}
.btn:hover,
.icon-btn:hover,
.tab-btn:hover,
.quick-link:hover {
  transform: translateY(-1px);
  border-color: rgba(125, 211, 252, 0.32);
  background: rgba(125, 211, 252, 0.08);
}
.btn-primary {
  background: linear-gradient(135deg, rgba(96, 165, 250, 0.24), rgba(34, 197, 94, 0.18));
  border-color: rgba(125, 211, 252, 0.28);
}
.btn-danger {
  border-color: rgba(251, 113, 133, 0.24);
}
.content-grid {
  margin-top: 18px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 380px;
  gap: 18px;
  align-items: start;
}
.main-column {
  display: grid;
  gap: 18px;
}
.section {
  padding: 22px 24px 24px;
}
.section-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 18px;
}
.section-title {
  margin: 8px 0 0;
  font-size: 22px;
  letter-spacing: -0.03em;
}
.section-desc {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.7;
}
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 14px;
}
.kpi-card {
  padding: 18px;
  border-radius: var(--radius-lg);
  background: linear-gradient(180deg, rgba(20, 30, 48, 0.98), rgba(13, 19, 31, 0.98));
  border: 1px solid rgba(255, 255, 255, 0.08);
}
.kpi-card:hover,
.focus-card:hover,
.task-card:hover,
.list-row:hover,
.summary-card:hover,
.archive-card:hover,
.timeline-card:hover {
  transform: translateY(-2px);
  border-color: var(--border-strong);
}
.kpi-label {
  color: var(--muted);
  font-size: 13px;
}
.kpi-value {
  margin-top: 8px;
  font-size: 32px;
  font-weight: 760;
  letter-spacing: -0.05em;
}
.kpi-foot {
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted-2);
  line-height: 1.6;
}
.focus-wrap {
  display: grid;
  grid-template-columns: minmax(0, 1.1fr) 320px;
  gap: 16px;
}
.focus-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
.focus-card,
.quick-panel {
  border-radius: var(--radius-lg);
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: linear-gradient(180deg, rgba(19, 27, 42, 0.98), rgba(12, 18, 29, 0.98));
}
.focus-card {
  padding: 16px;
  text-align: left;
}
.focus-card-top,
.task-card-top,
.task-card-foot,
.summary-card-top,
.list-row-main,
.list-row-meta,
.archive-card-top {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: flex-start;
}
.focus-card h3,
.task-title,
.summary-card h3,
.archive-card h3 {
  margin: 10px 0 0;
  font-size: 15px;
  line-height: 1.55;
}
.focus-card p,
.task-copy,
.summary-card p,
.archive-card p,
.timeline-card p,
.detail-copy,
.detail-muted,
.empty-state {
  color: var(--muted);
  line-height: 1.7;
  font-size: 13px;
}
.quick-panel {
  padding: 16px;
  display: grid;
  gap: 12px;
}
.quick-panel h3 {
  margin: 0;
  font-size: 15px;
}
.quick-link {
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.03);
  text-align: left;
  color: var(--text);
}
.quick-link small,
.focus-card-meta,
.workspace-meta,
.detail-stamp,
.timeline-meta,
.list-muted,
.archive-meta,
.lane-head p,
.empty-meta {
  color: var(--muted-2);
  font-size: 12px;
}
.badges {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  font-size: 12px;
  color: var(--text);
}
.badge.is-critical,
.badge.priority-P0 {
  color: #ffd6dd;
  border-color: rgba(251, 113, 133, 0.28);
  background: rgba(251, 113, 133, 0.12);
}
.badge.priority-P1,
.badge.is-warning {
  color: #ffe7b0;
  border-color: rgba(251, 191, 36, 0.28);
  background: rgba(251, 191, 36, 0.12);
}
.badge.priority-P2,
.badge.stage-dispatched,
.badge.stage-triage {
  color: #d6e7ff;
  border-color: rgba(96, 165, 250, 0.28);
  background: rgba(96, 165, 250, 0.12);
}
.badge.priority-P3,
.badge.stage-acked {
  color: #e7e2ff;
  border-color: rgba(167, 139, 250, 0.28);
  background: rgba(167, 139, 250, 0.12);
}
.badge.stage-executing,
.badge.stage-review {
  color: #cbffe6;
  border-color: rgba(52, 211, 153, 0.28);
  background: rgba(52, 211, 153, 0.12);
}
.badge.stage-builder_queue,
.badge.needs-builder {
  color: #fff0bc;
  border-color: rgba(251, 191, 36, 0.3);
  background: rgba(251, 191, 36, 0.14);
}
.badge.stage-blocked,
.badge.is-blocked {
  color: #ffd6dd;
  border-color: rgba(251, 113, 133, 0.28);
  background: rgba(251, 113, 133, 0.12);
}
.view-toggle {
  display: inline-flex;
  gap: 8px;
  flex-wrap: wrap;
}
.tab-btn {
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.03);
  color: var(--muted);
}
.tab-btn.is-active {
  color: var(--text);
  border-color: var(--border-strong);
  background: rgba(96, 165, 250, 0.12);
}
.toolbar-grid {
  display: grid;
  grid-template-columns: 2.3fr repeat(6, minmax(0, 1fr));
  gap: 12px;
}
.toolbar-field {
  display: grid;
  gap: 6px;
}
.toolbar-field span {
  color: var(--muted);
  font-size: 12px;
}
.toolbar-field input,
.toolbar-field select,
.detail-form select,
.detail-form textarea {
  width: 100%;
  padding: 11px 12px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text);
  outline: none;
}
.toolbar-field input:focus,
.toolbar-field select:focus,
.detail-form select:focus,
.detail-form textarea:focus {
  border-color: var(--border-strong);
  box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.12);
}
.workspace-meta {
  margin-top: 14px;
  margin-bottom: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.view-panel.is-hidden {
  display: none;
}
.board-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(260px, 1fr));
  gap: 14px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.lane {
  min-width: 260px;
  border-radius: var(--radius-lg);
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.03);
  display: flex;
  flex-direction: column;
  min-height: 520px;
}
.lane.is-drop-target {
  border-color: rgba(52, 211, 153, 0.45);
  box-shadow: inset 0 0 0 1px rgba(52, 211, 153, 0.22);
}
.lane-head {
  padding: 16px 16px 12px;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
}
.lane-head h3 {
  margin: 0;
  font-size: 14px;
}
.lane-count {
  min-width: 30px;
  height: 30px;
  border-radius: 999px;
  background: rgba(125, 211, 252, 0.12);
  color: var(--accent);
  display: grid;
  place-items: center;
  font-weight: 700;
  font-family: var(--mono);
}
.lane-body {
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 100%;
}
.task-card,
.summary-card,
.timeline-card,
.archive-card,
.list-row {
  border-radius: var(--radius-md);
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: linear-gradient(180deg, rgba(20, 28, 43, 0.98), rgba(12, 18, 29, 0.98));
}
.task-card {
  width: 100%;
  padding: 14px;
  text-align: left;
}
.task-card.is-selected,
.focus-card.is-selected,
.list-row.is-selected,
.archive-card.is-selected,
.timeline-card.is-selected {
  border-color: var(--border-strong);
  box-shadow: inset 0 0 0 1px rgba(96, 165, 250, 0.18);
}
.task-card.is-dragging {
  opacity: 0.45;
}
.task-title-row {
  display: flex;
  gap: 10px;
  justify-content: space-between;
}
.task-metrics {
  display: flex;
  gap: 8px;
  align-items: center;
  color: var(--muted-2);
  font-size: 11px;
}
.heat-dot {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: var(--muted-2);
}
.heat-dot.is-hot { background: var(--rose); }
.heat-dot.is-warm { background: var(--amber); }
.heat-dot.is-cool { background: var(--emerald); }
.empty-state {
  padding: 20px;
  border-radius: 14px;
  border: 1px dashed rgba(255, 255, 255, 0.12);
  background: rgba(255, 255, 255, 0.03);
  text-align: center;
}
.summary-grid,
.recent-grid,
.archive-summary-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}
.summary-card,
.timeline-card,
.archive-card {
  padding: 16px;
  text-align: left;
}
.summary-card h3,
.timeline-card h3,
.archive-card h3 {
  margin: 10px 0 0;
  font-size: 15px;
}
.list-view {
  display: grid;
  gap: 10px;
}
.list-head,
.list-row {
  display: grid;
  grid-template-columns: 1.9fr 0.85fr 0.9fr 0.9fr 0.9fr 1fr;
  gap: 12px;
  align-items: center;
}
.list-head {
  padding: 0 12px 10px;
  color: var(--muted-2);
  font-size: 12px;
}
.list-row {
  width: 100%;
  padding: 14px 12px;
  text-align: left;
}
.list-title {
  font-size: 14px;
  font-weight: 650;
}
.archive-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}
.archive-stack {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
.detail-shell {
  position: sticky;
  top: 20px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 40px);
}
.detail-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}
.detail-header h2 {
  margin: 8px 0 0;
  font-size: 20px;
}
.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text);
  display: grid;
  place-items: center;
  font-size: 20px;
}
#closeDetailBtn {
  display: none;
}
.detail-panel {
  overflow: auto;
  padding-top: 16px;
}
.detail-empty {
  min-height: 220px;
  display: grid;
  place-items: center;
}
.detail-title {
  margin: 12px 0 0;
  font-size: 24px;
  line-height: 1.35;
  letter-spacing: -0.03em;
}
.detail-meta {
  margin-top: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.detail-copy {
  margin-top: 12px;
}
.detail-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin-top: 16px;
}
.detail-block,
.detail-stat,
.history-item {
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.03);
}
.detail-stat {
  padding: 12px;
}
.detail-stat strong {
  display: block;
  font-size: 12px;
  color: var(--muted);
}
.detail-stat span {
  display: block;
  margin-top: 8px;
  font-size: 14px;
  line-height: 1.6;
}
.detail-form {
  margin-top: 18px;
  display: grid;
  gap: 12px;
}
.detail-form-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}
.detail-field {
  display: grid;
  gap: 6px;
}
.detail-field span {
  color: var(--muted);
  font-size: 12px;
}
.detail-field textarea {
  min-height: 92px;
  resize: vertical;
}
.detail-checkbox {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.03);
}
.detail-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.detail-block {
  padding: 14px;
  margin-top: 16px;
}
.detail-block h3 {
  margin: 0 0 10px;
  font-size: 14px;
}
.history-list {
  display: grid;
  gap: 10px;
}
.history-item {
  padding: 12px;
}
.detail-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(2, 6, 12, 0.66);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s ease;
}
.toast-root {
  position: fixed;
  right: 18px;
  bottom: 18px;
  display: grid;
  gap: 10px;
  z-index: 50;
}
.toast {
  min-width: 240px;
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid rgba(125, 211, 252, 0.26);
  background: rgba(10, 17, 29, 0.96);
  color: var(--text);
  box-shadow: var(--shadow);
}
@media (max-width: 1480px) {
  .kpi-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .toolbar-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .toolbar-search { grid-column: 1 / -1; }
  .focus-wrap { grid-template-columns: 1fr; }
}
@media (max-width: 1180px) {
  .content-grid { grid-template-columns: 1fr; }
  .detail-shell {
    position: fixed;
    top: 0;
    right: -440px;
    width: min(420px, 100vw);
    height: 100vh;
    max-height: none;
    z-index: 40;
    border-radius: 0;
    transition: right 0.2s ease;
  }
  .detail-shell.is-open { right: 0; }
  .detail-backdrop.is-open {
    opacity: 1;
    pointer-events: auto;
  }
  #closeDetailBtn { display: grid; }
}
@media (max-width: 920px) {
  .app-shell { width: min(100% - 24px, 100%); margin-top: 12px; }
  .topbar-main { flex-direction: column; }
  .kpi-grid,
  .summary-grid,
  .recent-grid,
  .archive-summary-grid,
  .detail-grid,
  .detail-form-grid,
  .archive-stack,
  .focus-grid { grid-template-columns: 1fr; }
  .list-head,
  .list-row { grid-template-columns: 1.6fr repeat(2, 1fr); }
  .list-head div:nth-child(n+4),
  .list-row > *:nth-child(n+4) { display: none; }
}
@media (max-width: 640px) {
  .topbar,
  .section,
  .detail-shell { padding-left: 16px; padding-right: 16px; }
  .btn { width: 100%; }
  .topbar-actions { display: grid; grid-template-columns: 1fr 1fr; }
  .toolbar-grid { grid-template-columns: 1fr; }
}

  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar panel">
      <div class="topbar-main">
        <div>
          <div class="eyebrow">Task Control Center</div>
          <h1>团队任务调度台</h1>
          <p class="topbar-subtitle">BuilderDong 的桌面优先任务流转台 · 单文件预览 · 本地交互草稿可持久化</p>
        </div>
        <div class="topbar-meta">
          <div class="meta-chip">数据源：<strong>data/tasks.json</strong></div>
          <div class="meta-chip">生成时间：<strong>2026/03/13 08:06</strong></div>
          <div class="meta-chip">部署入口：<strong>scripts/update-board.sh</strong></div>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="quickBuilderFilter" class="btn btn-primary" type="button">只看待我处理</button>
        <button id="downloadExportBtn" class="btn" type="button">导出 JSON</button>
        <button id="copyExportBtn" class="btn" type="button">复制 JSON</button>
        <button id="clearOverridesBtn" class="btn btn-danger" type="button">清除本地修改</button>
      </div>
    </header>

    <div class="content-grid">
      <main class="main-column">
        <section id="focusSection" class="panel section"></section>
        <section id="kpiSection" class="kpi-grid"></section>

        <section class="panel section">
          <div class="section-head">

  <script>
(function () {
  const payload = window.__BOARD_PAYLOAD__ || {};
  const STORAGE_KEY = 'openclaw-board-overrides-v2';
  const UI_KEY = 'openclaw-board-ui-v2';
  const MOBILE_BREAKPOINT = 1180;

  const owners = payload.meta?.owners || {};
  const priorities = payload.meta?.priorities || {};
  const categories = payload.meta?.categories || {};
  const stages = payload.meta?.stages || {};
  const stageOrder = payload.meta?.stageOrder || [];
  const priorityOrder = Object.keys(priorities).sort((a, b) => (priorities[a]?.weight ?? 999) - (priorities[b]?.weight ?? 999));
  const stageRank = Object.fromEntries(stageOrder.map((stage, index) => [stage, index]));
  const taskMap = Object.fromEntries((payload.tasks || []).map((task) => [task.id, task]));
  const baseTaskKeys = Array.from(new Set((payload.tasks || []).flatMap((task) => Object.keys(task))));

  const persistedUi = readJson(UI_KEY, {});
  const state = {
    overrides: readJson(STORAGE_KEY, {}),
    view: persistedUi.view || 'board',
    search: persistedUi.search || '',
    filters: {
      stage: persistedUi.filters?.stage || 'all',
      owner: persistedUi.filters?.owner || 'all',
      priority: persistedUi.filters?.priority || 'all',
      category: persistedUi.filters?.category || 'all',
      needsBuilder: persistedUi.filters?.needsBuilder || 'all',
      blocked: persistedUi.filters?.blocked || 'all',
    },
    selectedTaskId: persistedUi.selectedTaskId || (payload.tasks?.[0]?.id ?? null),
    archiveTab: persistedUi.archiveTab || 'all',
    drawerOpen: false,
  };

  const dom = {
    focusSection: document.getElementById('focusSection'),
    kpiSection: document.getElementById('kpiSection'),
    boardView: document.getElementById('boardView'),
    listView: document.getElementById('listView'),
    archiveView: document.getElementById('archiveView'),
    riskSection: document.getElementById('riskSection'),
    recentSection: document.getElementById('recentSection'),
    archiveSummarySection: document.getElementById('archiveSummarySection'),
    detailShell: document.getElementById('detailShell'),
    detailPanel: document.getElementById('detailPanel'),
    detailBackdrop: document.getElementById('detailBackdrop'),
    toastRoot: document.getElementById('toastRoot'),
    searchInput: document.getElementById('searchInput'),
    filterStage: document.getElementById('filterStage'),
    filterOwner: document.getElementById('filterOwner'),
    filterPriority: document.getElementById('filterPriority'),
    filterCategory: document.getElementById('filterCategory'),
    filterNeedsBuilder: document.getElementById('filterNeedsBuilder'),
    filterBlocked: document.getElementById('filterBlocked'),
    workspaceMeta: document.getElementById('workspaceMeta'),
    viewToggle: document.getElementById('viewToggle'),
    quickBuilderFilter: document.getElementById('quickBuilderFilter'),
    downloadExportBtn: document.getElementById('downloadExportBtn'),
    copyExportBtn: document.getElementById('copyExportBtn'),
    clearOverridesBtn: document.getElementById('clearOverridesBtn'),
    closeDetailBtn: document.getElementById('closeDetailBtn'),
  };

  init();

  function init() {
    populateFilters();
    bindStaticEvents();
    dom.searchInput.value = state.search;
    render();
  }

  function readJson(key, fallback) {
    try {
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (error) {
      return fallback;
    }
  }

  function writeJson(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
  }

  function persistUi() {
    writeJson(UI_KEY, {
      view: state.view,
      search: state.search,
      filters: state.filters,
      selectedTaskId: state.selectedTaskId,
      archiveTab: state.archiveTab,
    });
  }

  function persistOverrides() {
    writeJson(STORAGE_KEY, state.overrides);
  }

  function ownerLabel(key) {
    return owners[key]?.label || key || '未分配';
  }

  function priorityLabel(key) {
    return priorities[key]?.label || key || '—';
  }

  function categoryLabel(key) {
    return categories[key]?.label || key || '—';
  }

  function stageLabel(key) {
    return stages[key]?.label || key || '—';
  }

  function stageDescription(key) {
    return stages[key]?.description || '';
  }

  function formatDate(value, withTime) {
    if (!value) return '—';
    const options = {
      timeZone: 'Asia/Shanghai',
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour12: false,
    };
    if (withTime !== false) {
      options.hour = '2-digit';
      options.minute = '2-digit';
    }
    return new Intl.DateTimeFormat('zh-CN', options).format(new Date(value));
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function isArchived(task) {
    return Boolean(task.archived || task.stage === 'done');
  }

  function isBlocked(task) {
    return Boolean(task.blocked || task.stage === 'blocked' || String(task.blocker || '').trim());
  }

  function needsBuilder(task) {
    return Boolean(task.needsBuilder || task.stage === 'builder_queue' || isBlocked(task));
  }

  function compareTasks(a, b) {
    const priorityDiff = (priorities[a.priority]?.weight ?? 999) - (priorities[b.priority]?.weight ?? 999);
    if (priorityDiff !== 0) return priorityDiff;

    const stageDiff = (stageRank[a.stage] ?? 999) - (stageRank[b.stage] ?? 999);
    if (stageDiff !== 0) return stageDiff;

    return new Date(b.updatedAt || 0).getTime() - new Date(a.updatedAt || 0).getTime();
  }

  function getEffectiveTasks() {
    return (payload.tasks || [])
      .map((baseTask) => {
        const override = state.overrides[baseTask.id] || {};
        const merged = { ...baseTask, ...override };
        merged.blocker = merged.blocker || '';
        merged.substatus = merged.substatus || '';
        merged.nextAction = merged.nextAction || '';
        merged.archived = isArchived(merged);
        merged.__archived = isArchived(merged);
        merged.__blocked = isBlocked(merged);
        merged.__needsBuilder = needsBuilder(merged);
        merged.__active = !merged.__archived;
        merged.__heat = heatLevel(merged.updatedAt);
        merged.__search = [
          merged.title,
          merged.summary,
          merged.goal,
          merged.substatus,
          merged.nextAction,
          merged.blocker,
          merged.builderAction,
          ownerLabel(merged.owner),
          priorityLabel(merged.priority),
          categoryLabel(merged.category),
          stageLabel(merged.stage),
          ...(merged.tags || []),
        ]
          .filter(Boolean)
          .join(' ')
          .toLowerCase();
        return merged;
      })
      .sort(compareTasks);
  }

  function heatLevel(updatedAt) {
    const ageHours = Math.max(0, (Date.now() - new Date(updatedAt || 0).getTime()) / 36e5);
    if (ageHours <= 24) return 'hot';
    if (ageHours <= 72) return 'warm';
    return 'cool';
  }

  function getDerived() {
    const tasks = getEffectiveTasks();
    const activeTasks = tasks.filter((task) => task.__active);
    const archivedTasks = tasks.filter((task) => task.__archived);
    const builderTasks = activeTasks.filter((task) => task.__needsBuilder);
    const blockedTasks = activeTasks.filter((task) => task.__blocked);
    const reviewTasks = activeTasks.filter((task) => task.stage === 'review');
    const urgentTasks = activeTasks.filter((task) => task.priority === 'P0');
    const recentTasks = [...tasks]
      .sort((a, b) => new Date(b.updatedAt || 0).getTime() - new Date(a.updatedAt || 0).getTime())
      .slice(0, 12);

    const stageCounts = Object.fromEntries(stageOrder.map((stage) => [stage, activeTasks.filter((task) => task.stage === stage).length]));

    return {
      tasks,
      activeTasks,
      archivedTasks,
      builderTasks,
      blockedTasks,
      reviewTasks,
      urgentTasks,
      recentTasks,
      stageCounts,
      activeVisible: activeTasks.filter(matchesFilters),
      archivedVisible: archivedTasks.filter(matchesArchiveFilters),
      summary: {
        activeCount: activeTasks.length,
        archivedCount: archivedTasks.length,
        builderCount: builderTasks.length,
        blockedCount: blockedTasks.length,
        executingCount: activeTasks.filter((task) => task.stage === 'executing').length,
        reviewCount: reviewTasks.length,
        overrideCount: Object.keys(state.overrides).length,
      },
    };
  }

  function matchesFilters(task) {
    if (!task.__active) return false;
    if (state.filters.stage !== 'all' && task.stage !== state.filters.stage) return false;
    if (state.filters.owner !== 'all' && task.owner !== state.filters.owner) return false;
    if (state.filters.priority !== 'all' && task.priority !== state.filters.priority) return false;
    if (state.filters.category !== 'all' && task.category !== state.filters.category) return false;
    if (state.filters.needsBuilder === 'yes' && !task.__needsBuilder) return false;
    if (state.filters.needsBuilder === 'no' && task.__needsBuilder) return false;
    if (state.filters.blocked === 'yes' && !task.__blocked) return false;
    if (state.filters.blocked === 'no' && task.__blocked) return false;
    if (state.search && !task.__search.includes(state.search)) return false;
    return true;
  }

  function matchesArchiveFilters(task) {
    if (!task.__archived) return false;
    if (state.filters.owner !== 'all' && task.owner !== state.filters.owner) return false;
    if (state.filters.priority !== 'all' && task.priority !== state.filters.priority) return false;
    if (state.filters.category !== 'all' && task.category !== state.filters.category) return false;
    if (state.search && !task.__search.includes(state.search)) return false;
    if (state.archiveTab !== 'all' && task.category !== state.archiveTab) return false;
    return true;
  }

  function ensureSelectedTask(derived) {
    if (state.selectedTaskId && derived.tasks.some((task) => task.id === state.selectedTaskId)) return;
    state.selectedTaskId = derived.activeVisible[0]?.id || derived.activeTasks[0]?.id || derived.archivedTasks[0]?.id || null;
  }

  function render() {
    const derived = getDerived();
    ensureSelectedTask(derived);
    renderViewToggle();
    renderFocus(derived);
    renderKpis(derived);
    renderWorkspace(derived);
    renderRisk(derived);
    renderRecent(derived);
    renderArchiveSummary(derived);
    renderDetail(derived);
    syncControls();
    syncDrawer();
    persistUi();
  }

  function populateFilters() {
    fillSelect(dom.filterStage, [{ value: 'all', label: '全部阶段' }, ...stageOrder.filter((stage) => stage !== 'done').map((stage) => ({ value: stage, label: stageLabel(stage) }))]);
    fillSelect(dom.filterOwner, [{ value: 'all', label: '全部负责人' }, ...Object.keys(owners).map((owner) => ({ value: owner, label: ownerLabel(owner) }))]);
    fillSelect(dom.filterPriority, [{ value: 'all', label: '全部优先级' }, ...priorityOrder.map((priority) => ({ value: priority, label: priorityLabel(priority) }))]);
    fillSelect(dom.filterCategory, [{ value: 'all', label: '全部分类' }, ...Object.keys(categories).map((category) => ({ value: category, label: categoryLabel(category) }))]);
    fillSelect(dom.filterNeedsBuilder, [
      { value: 'all', label: '全部' },
      { value: 'yes', label: '只看待我处理' },
      { value: 'no', label: '排除待我处理' },

    fillSelect(dom.filterBlocked, [
      { value: 'all', label: '全部' },
      { value: 'yes', label: '只看阻塞' },
      { value: 'no', label: '排除阻塞' },
    ]);
  }

  }

  }

  function metaBadge(label) {
    return `<div class="meta-chip">${escapeHtml(label)}</div>`;
  }

  function badge(label, className) {
    return `<span class="badge ${className || ''}">${escapeHtml(label)}</span>`;
  }

  function bindStaticEvents() {
    dom.searchInput.addEventListener('input', (event) => {
      state.search = event.target.value.trim().toLowerCase();
      render();
    });

    [
      ['stage', dom.filterStage],
      ['owner', dom.filterOwner],
      ['priority', dom.filterPriority],
      ['category', dom.filterCategory],
      ['needsBuilder', dom.filterNeedsBuilder],
      ['blocked', dom.filterBlocked],
    ].forEach(([key, node]) => {
      node.addEventListener('change', (event) => {
        state.filters[key] = event.target.value;
        render();
      });
    });

    dom.quickBuilderFilter.addEventListener('click', () => {
      applyBuilderFilter();
    });

    dom.downloadExportBtn.addEventListener('click', downloadExport);
    dom.copyExportBtn.addEventListener('click', copyExport);
    dom.clearOverridesBtn.addEventListener('click', clearOverrides);
    dom.closeDetailBtn.addEventListener('click', closeDrawer);
    dom.detailBackdrop.addEventListener('click', closeDrawer);

    document.addEventListener('click', handleClick);
    document.addEventListener('change', handleDetailSave);
    document.addEventListener('blur', handleDetailSave, true);
    document.addEventListener('dragstart', handleDragStart);
    document.addEventListener('dragend', handleDragEnd);
    document.addEventListener('dragover', handleDragOver);
    document.addEventListener('dragleave', handleDragLeave);
    document.addEventListener('drop', handleDrop);
    window.addEventListener('resize', syncDrawer);
  }

  function handleClick(event) {
    const actionNode = event.target.closest('[data-action]');
    if (actionNode) {
      const action = actionNode.dataset.action;
      if (action === 'switch-view') {
        state.view = actionNode.dataset.view;
        render();
        return;
      }
      if (action === 'archive-tab') {
        state.archiveTab = actionNode.dataset.category;
        render();
        return;
      }
      if (action === 'apply-builder-filter') {
        applyBuilderFilter();
        return;
      }
      if (action === 'apply-blocked-filter') {
        state.filters.blocked = 'yes';
        state.view = 'board';
        render();
        return;
      }
      if (action === 'clear-filters') {
        resetFilters();
        render();
        return;
      }
      if (action === 'restore-task') {
        const taskId = actionNode.dataset.taskId;
        delete state.overrides[taskId];
        persistOverrides();
        showToast('已恢复该任务的默认数据');
        render();
        return;
      }
      if (action === 'copy-task-json') {
        const taskId = actionNode.dataset.taskId;
        const task = getEffectiveTasks().find((item) => item.id === taskId);
        if (task) copyText(JSON.stringify(normalizeTask(task), null, 2), '已复制当前任务 JSON');
        return;
      }
    }

    const taskNode = event.target.closest('[data-task-id]');
    if (taskNode) {
      openTask(taskNode.dataset.taskId);
    }
  }

  function handleDetailSave(event) {
    const field = event.target?.dataset?.detailField;
    if (!field) return;
    if (event.type === 'blur' && event.target.tagName !== 'TEXTAREA') return;

    const taskId = event.target.closest('[data-task-id]')?.dataset?.taskId || state.selectedTaskId;
    if (!taskId) return;

    let value;
    if (event.target.type === 'checkbox') value = event.target.checked;
    else value = event.target.value;

    saveField(taskId, field, value);
  }

  function saveField(taskId, field, value) {
    const current = getEffectiveTasks().find((task) => task.id === taskId);
    if (!current) return;

    const patch = { [field]: value, updatedAt: new Date().toISOString() };

    if (field === 'stage') {
      patch.archived = value === 'done' ? true : false;
      patch.blocked = value === 'blocked';
      if (value === 'done') patch.doneAt = new Date().toISOString();
    }

    if (field === 'blocker') {
      const hasBlocker = Boolean(String(value || '').trim());
      patch.blocked = hasBlocker || current.stage === 'blocked';
    }

    if (field === 'archived') {
      patch.archived = Boolean(value);
      if (!value && current.stage === 'done') {
        patch.stage = 'review';
      }
      if (value && current.stage !== 'done' && !current.doneAt) {
        patch.doneAt = new Date().toISOString();
      }
    }

    state.overrides[taskId] = {
      ...(state.overrides[taskId] || {}),
      ...patch,
    };

    persistOverrides();
    showToast('已保存到本地草稿');
    render();
  }

  function applyBuilderFilter() {
    state.view = 'board';
    state.filters.needsBuilder = 'yes';
    render();
  }

  function resetFilters() {
    state.filters = {
      stage: 'all',
      owner: 'all',
      priority: 'all',
      category: 'all',
      needsBuilder: 'all',
      blocked: 'all',
    };
    state.search = '';
    state.archiveTab = 'all';
  }

  function clearOverrides() {
    if (!window.confirm('确定要清除所有本地修改吗？此操作不会影响仓库里的 data/tasks.json。')) return;
    state.overrides = {};
    persistOverrides();
    showToast('已清除本地修改，恢复默认数据');
    render();
  }

  function openTask(taskId) {
    state.selectedTaskId = taskId;
    if (window.innerWidth <= MOBILE_BREAKPOINT) {
      state.drawerOpen = true;
    }
    render();
  }

  function closeDrawer() {
    state.drawerOpen = false;
    syncDrawer();
  }

  function syncDrawer() {
    const shouldOverlay = window.innerWidth <= MOBILE_BREAKPOINT;
    dom.detailShell.classList.toggle('is-open', shouldOverlay && state.drawerOpen);
    dom.detailBackdrop.classList.toggle('is-open', shouldOverlay && state.drawerOpen);
    if (!shouldOverlay) {
      dom.detailShell.classList.remove('is-open');
      dom.detailBackdrop.classList.remove('is-open');
    }
  }

  function handleDragStart(event) {
    const card = event.target.closest('.task-card[data-draggable="true"]');
    if (!card) return;
    event.dataTransfer.setData('text/plain', card.dataset.taskId);
    event.dataTransfer.effectAllowed = 'move';
    card.classList.add('is-dragging');
  }

  function handleDragEnd(event) {
    const card = event.target.closest('.task-card');
    if (card) card.classList.remove('is-dragging');
    document.querySelectorAll('.lane.is-drop-target').forEach((lane) => lane.classList.remove('is-drop-target'));
  }

  function handleDragOver(event) {
    const lane = event.target.closest('[data-stage-lane]');
    if (!lane) return;
    event.preventDefault();
    lane.classList.add('is-drop-target');
  }

  function handleDragLeave(event) {
    const lane = event.target.closest('[data-stage-lane]');
    if (!lane) return;
    if (lane.contains(event.relatedTarget)) return;
    lane.classList.remove('is-drop-target');
  }

  function handleDrop(event) {
    const lane = event.target.closest('[data-stage-lane]');
    if (!lane) return;
    event.preventDefault();
    lane.classList.remove('is-drop-target');
    const taskId = event.dataTransfer.getData('text/plain');
    const nextStage = lane.dataset.stageLane;
    if (!taskId || !nextStage) return;
    saveField(taskId, 'stage', nextStage);
    showToast(`已将任务移动到「${stageLabel(nextStage)}」`);
  }

  function getExportPayload() {
    return {
      version: payload.version,
      board: payload.board,
      meta: payload.meta,
      tasks: getEffectiveTasks().map(normalizeTask),
    };
  }

  function normalizeTask(task) {
    const output = {};
    baseTaskKeys.forEach((key) => {
      if (typeof task[key] !== 'undefined') output[key] = task[key];
    });
    return output;
  }

  function downloadExport() {
    const exportText = JSON.stringify(getExportPayload(), null, 2);
    const blob = new Blob([`${exportText}\n`], { type: 'application/json;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tasks-local-export-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast('已下载当前 tasks JSON');
  }

  function copyExport() {
    copyText(JSON.stringify(getExportPayload(), null, 2), '已复制当前 tasks JSON');
  }

  function copyText(text, successMessage) {
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).then(
        () => showToast(successMessage),
        () => fallbackCopy(text, successMessage)
      );
    } else {
      fallbackCopy(text, successMessage);
    }
  }

  function fallbackCopy(text, successMessage) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.left = '-9999px';
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    textarea.remove();
    showToast(successMessage);
  }

  function showToast(message) {
    const node = document.createElement('div');
    node.className = 'toast';
    node.textContent = message;
    dom.toastRoot.appendChild(node);
    setTimeout(() => {
      node.style.opacity = '0';
      setTimeout(() => node.remove(), 180);
    }, 1800);
  }
})();

  </script>
</body>
</html>
